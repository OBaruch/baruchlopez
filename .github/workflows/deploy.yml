name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "src/**"
      - "public/**"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          node-version: 24

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
